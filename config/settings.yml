app:
  name: "Training Management System"
  version: "1.0.0"
  description: "A Ruby on Rails training management system"
  author: "Training Team"
  default_user_name: "User"

mailer:
  default_from: "noreply@example.com"

user:
  max_name_length: 50
  max_email_length: 255
  max_nick_name_length: 50
  birthday_valid_years: 100
  min_password_length: 6
  roles:
    trainee: 0
    supervisor: 1
    admin: 2
  genders:
    female: 0
    male: 1
    other: 2

course:
  max_name_length: 200
  status:
    draft: 0
    active: 1
    inactive: 2
    completed: 3
  allowed_image_types: ["image/jpeg", "image/png"]
  max_image_size: 10 # in MB

subject:
  max_name_length: 150
  default_max_score: 100
  max_score_limit: 1000
  allowed_image_types: ["image/jpeg", "image/png"]
  max_image_size: 10 # in MB

category:
  max_name_length: 100

task:
  max_name_length: 200
  max_description_length: 5000
  status:
    new: 0
    in_progress: 1
    finished: 2

comment:
  max_content_length: 5000
  min_content_length: 1

daily_report:
  max_content_length: 5000
  status:
    pending: false
    completed: true

user_task:
  min_spent_time: 0
  status:
    not_done: 0
    done: 1
  allowed_document_types: ["application/pdf", "image/jpeg", "image/png"]
  max_document_size: 50 # in MB

course_subject:
  min_position: 1

subject_category:
  min_position: 1

user_subject:
  min_score: 0
  max_score: 10
  status:
    not_started: 0
    learning: 1
    reviewing: 2
    passed: 3
    failed: 4
    cancelled: 5

validation_messages:
  required: "is required"
  too_long: "is too long"
  too_short: "is too short"
  invalid_format: "has invalid format"
  must_be_after: "must be after"
  must_be_greater_than: "must be greater than"
  cannot_exceed: "cannot exceed"

error_messages:
  finish_date_after_start_date: "must be after start date"
  member_to_after_member_from: "must be after member from date"
  score_cannot_exceed_max: "cannot exceed maximum score"

session:
  login_attempts_limit: 10
  lockout_duration: 900
  session_timeout: 7200

i18n:
  default_locale: "vi"
  available_locales: ["vi", "en"]
  fallback_locale: "vi"

email:
  from: "noreply@example.com"
  support: "support@example.com"

ui:
  theme: "default"
  items_per_page: 10
  max_upload_size: 5242880 # 5MB
  gravatar:
    default_size: 80
    list_size: 50

features:
  registration: true
  email_verification: false
  social_login: false

external_services:
  google_analytics: ""
  facebook_app_id: ""
  twitter_api_key: ""

links:
  help: "https://www.railstutorial.org/help"
  book: "https://www.railstutorial.org/book"
  railstutorial: "http://www.railstutorial.org/"
  gravatar: "https://secure.gravatar.com"
  gravatar_email: "http://gravatar.com/emails"
